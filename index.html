<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Assistant</title>
  <link rel="stylesheet" href="./node_modules/vditor/dist/index.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-container">
    <div class="toolbar">
      <div class="toolbar-left">
        <button id="newFile" class="btn" title="新建文件">
          <span class="icon">📄</span>
        </button>
        <button id="openFile" class="btn" title="打开文件">
          <span class="icon">📂</span>
        </button>
        <button id="historyBtn" class="btn" title="历史文件">
          <span class="icon">🕐</span>
        </button>
        <button id="saveFile" class="btn" title="保存文件">
          <span class="icon">💾</span>
        </button>
        <button id="saveAsFile" class="btn" title="另存为">
          <span class="icon">📝</span>
        </button>
        <button id="closeFile" class="btn" title="关闭文件 (Ctrl+W)">
          <span class="icon">✕</span>
        </button>
        <button id="exportPdf" class="btn" title="导出为PDF">
          <span class="icon">📄</span> PDF
        </button>
      </div>
      <div class="toolbar-center">
        <span id="currentFile" class="current-file">未命名文件</span>
        <span id="modifiedIndicator" class="modified-indicator hidden">*</span>
      </div>
      <div class="toolbar-right">
        <div class="theme-selector">
          <button id="themeLight" class="theme-btn active" data-theme="light" title="浅色主题">
            <span class="theme-icon">☀️</span>
            <span class="theme-label">浅色</span>
          </button>
          <button id="themeDark" class="theme-btn" data-theme="dark" title="深色主题">
            <span class="theme-icon">🌙</span>
            <span class="theme-label">深色</span>
          </button>
          <button id="themeGray" class="theme-btn" data-theme="gray" title="灰色主题">
            <span class="theme-icon">🌫️</span>
            <span class="theme-label">灰色</span>
          </button>
        </div>
        <button id="modeWysiwyg" class="btn mode-btn" data-mode="wysiwyg" title="所见即所得模式">WYSIWYG</button>
        <button id="modeIR" class="btn mode-btn" data-mode="ir" title="即时渲染模式">IR</button>
        <button id="modeSV" class="btn mode-btn active" data-mode="sv" title="分屏预览模式">SV</button>
      </div>
    </div>
    <div id="vditor" class="editor-container"></div>
  </div>

  <!-- 历史文件列表弹窗 -->
  <div id="historyModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>历史文件</h3>
        <button id="closeHistoryModal" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="historyList" class="history-list"></div>
      </div>
      <div class="modal-footer">
        <button id="clearAllHistory" class="btn btn-danger">清除全部历史</button>
      </div>
    </div>
  </div>

  <!-- PDF导出弹窗 -->
  <div id="pdfModal" class="modal hidden">
    <div class="modal-content pdf-modal">
      <div class="modal-header">
        <h3>导出为PDF</h3>
        <button id="closePdfModal" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">

        <div class="form-group">
          <label for="pdfPageSize">页面大小</label>
          <select id="pdfPageSize" class="form-control">
            <option value="a4">A4</option>
            <option value="letter">Letter</option>
            <option value="legal">Legal</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pdfOrientation">页面方向</label>
          <select id="pdfOrientation" class="form-control">
            <option value="portrait">纵向</option>
            <option value="landscape">横向</option>
          </select>
        </div>
        <div class="form-group">
          <label for="pdfMargin">边距</label>
          <select id="pdfMargin" class="form-control">
            <option value="default">默认</option>
            <option value="none">无</option>
            <option value="minimum">最小</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancelPdf" class="btn">取消</button>
        <button id="confirmPdf" class="btn btn-primary">导出</button>
      </div>
    </div>
  </div>

  <!-- 遮罩层 -->
  <div id="overlay" class="overlay hidden"></div>

  <script type="module" src="/main.js"></script>
</body>
</html>
